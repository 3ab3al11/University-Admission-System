version: 2

updates:
  - package-ecosystem: nuget
    directories:
      - "/"
      - "/tests/ANU_Admissions.UnitTests"
      - "/tests/ANU_Admissions.SqlServerTests"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
