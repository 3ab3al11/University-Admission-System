name: Feature request
description: Suggest a focused improvement to the admission workflow.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or administrator problem should be solved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior and its expected outcome.
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Primary user
      options:
        - Student
        - Administrator
        - Maintainer or developer
        - Multiple roles
    validations:
      required: true

  - type: textarea
    id: considerations
    attributes:
      label: Data, security, and compatibility considerations
      description: Note schema, privacy, authorization, localization, or migration impact.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and documentation first.
          required: true
