name: Bug report
description: Report a reproducible defect using synthetic data only.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: >-
        Do not include passwords, tokens, connection strings, or real student
        records. Security vulnerabilities must follow SECURITY.md.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the actual behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence using synthetic data.
      placeholder: |
        1. Sign in as ...
        2. Open ...
        3. Submit ...
        4. Observe ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Student workflow
        - Administrator workflow
        - Allocation engine
        - Excel import
        - Authentication or authorization
        - Database or migrations
        - Localization or UI
        - Docker or CI
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include OS, .NET SDK, browser, and SQL Server versions.
      placeholder: Windows 11, .NET 8.0.x, Edge, SQL Server LocalDB
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove personal data, credentials, tokens, and connection strings.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I used synthetic data and removed all secrets and personal information.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
